{% extends "base.html" %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-container">
        <div class="auth-header">
            <!-- Shield Icon -->
            <svg class="auth-logo" viewBox="0 0 48 48" width="48px" height="48px">
                <path fill="#FBBC05" d="M24 4C12.95 4 4 12.95 4 24c0 11.05 8.95 20 20 20 11.05 0 20-8.95 20-20C44 12.95 35.05 4 24 4z"/>
                <path fill="#fff" d="M24 14v12h10"/> <!-- Clock/Time Icon to represent TOTP -->
            </svg>

            <h1 class="auth-title">2-Step Verification</h1>
            <p class="auth-subtitle">Enter the code from your authenticator app</p>
        </div>

        <form method="POST">
            <!-- OTP Input -->
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="otp_token" name="otp_token" placeholder="123456" autocomplete="off" required>
                <label for="otp_token">Enter 6-digit code</label>
            </div>

            <!-- Checkbox for 'Don't ask again' (Visual only for now) -->
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="dontAsk" style="background-color: transparent; border-color: #5f6368;">
                <label class="form-check-label" for="dontAsk" style="color: #9aa0a6; font-size: 14px;">
                    Don't ask again on this device
                </label>
            </div>

            <div class="action-row">
                <a href="{{ url_for('auth.login') }}" class="btn-link-custom">Back</a>
                <button type="submit" class="btn btn-primary-google">
                    Verify
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
