{% extends "base_dashboard.html" %}

{% block dashboard_content %}
<div class="row justify-content-center" style="margin-top: 30px;">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0"><i class="fas fa-mobile-alt"></i> Setup Authenticator</h5>
            </div>
            <div class="card-body text-center">
                <p class="text-muted">
                    Scan this QR code with <strong>Google Authenticator</strong> or <strong>Authy</strong>.
                </p>

                <div class="mb-4 p-3 d-inline-block bg-white rounded border">
                    <!-- QR Code Image -->
                    <img src="data:image/png;base64,{{ qr_code }}" alt="QR Code" style="width: 180px; height: 180px;">
                </div>



                <hr>

                <form method="POST">
                    <div class="form-floating mb-3">
                        <input type="text" name="otp_token" class="form-control" id="otp_token"
                            placeholder="e.g. 123456" required>
                        <label for="otp_token">Verify Code</label>
                    </div>
                    <div class="form-text mb-3 text-start">Enter the 6-digit code from your app to confirm setup.</div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Enable 2FA</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
