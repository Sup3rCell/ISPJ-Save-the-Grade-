{% extends "base.html" %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-container">
        <div class="auth-header">
             <!-- Logo -->
             <h1 class="auth-title">Register Organization</h1>
             <p class="auth-subtitle">Get started with Zero-Trust Gateway</p>
        </div>

        <form method="POST" action="{{ url_for('auth.register_org') }}">
            
            <!-- NEW: Organization Name -->
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="org_name" name="org_name" placeholder="Company Inc." required>
                <label for="org_name">Organization Name</label>
            </div>

            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="username" name="username" placeholder="Admin Username" required>
                <label for="username">Admin Username</label>
            </div>

            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="email" name="email" placeholder="admin@company.com" required>
                <label for="email">Admin Email</label>
            </div>

            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                <label for="password">Password</label>
            </div>

            <div class="action-row">
                <a href="{{ url_for('auth.login') }}" class="btn-link-custom">Sign in instead</a>
                <button type="submit" class="btn btn-primary-google">
                    Register Org
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
