{% extends "base_dashboard.html" %}

{% block dashboard_content %}
<style>
    .secure-container {
        position: relative;
        height: 100%;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .watermark-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 10;
        overflow: hidden;
    }

    .watermark-text {
        position: absolute;
        color: rgba(200, 200, 200, 0.3);
        font-weight: bold;
        transform: rotate(-30deg);
        user-select: none;
        pointer-events: none;
    }

    .content-layer {
        position: relative;
        z-index: 1;
        height: 100%;
        display: flex;
        flex-direction: column;
        padding: 10px;
        overflow-y: hidden;
    }

    .pdf-frame {
        flex-grow: 1;
        width: 100%;
        border: none;
        border-radius: 4px;
        margin-top: 10px;
        height: 100%;
    }

    /* Print Protection */
    @media print {
        body * {
            visibility: hidden !important;
        }

        .watermark-layer {
            visibility: visible !important;
            background: white;
            z-index: 9999;
        }

        .watermark-layer::after {
            content: "DO NOT PRINT";
            font-size: 5em;
            color: red;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    }
</style>

<div class="secure-container">
    <!-- FORENSIC WATERMARKS -->
    <div class="watermark-layer">
        <div class="watermark-text"
            style="top: 50%; left: 50%; font-size: 48px; transform: translate(-50%, -50%) rotate(-20deg);">
            {{ watermark_text }}
        </div>
        <div class="watermark-text" style="top: 20%; left: 10%; font-size: 72px; color: rgba(220, 220, 220, 0.15);">
            {{ document.classification|upper }} DOCUMENT
        </div>
    </div>

    <!-- CONTENT -->
    <div class="content-layer">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h2 class="h5 mb-0 text-light">{{ document.name }} <span
                    class="badge bg-dark border border-secondary text-secondary ms-2" style="font-weight: normal;">{{
                    document.classification }}</span></h2>
            <div class="badge bg-primary">
                Risk Score: <span id="risk-display">{{ risk_score }}%</span>
            </div>
        </div>

        {% if document.is_pdf %}
        <!-- Interactive PDF Iframe -->
        <iframe src="data:application/pdf;base64,{{ document.pdf_data }}" class="pdf-frame">
            This browser does not support PDFs.
        </iframe>
        {% else %}
        <!-- Scrollable Text Content -->
        <div class="bg-light text-dark p-3 rounded"
            style="flex-grow: 1; overflow-y: auto; white-space: pre-wrap; font-family: monospace; height: 100%;">
            {{ document.content }}
        </div>
        {% endif %}
    </div>
</div>

<script>
    // ABSOLUTE NUCLEAR DRM
    document.addEventListener('contextmenu', event => event.preventDefault());

    // Block Key Combos
    document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && ['a', 'p', 's', 'c', 'v', 'u', 'i', 'j'].includes(e.key.toLowerCase())) {
            e.preventDefault();
        }
        if (e.key.startsWith('F') && e.key !== 'F5') { // Block function keys except F5
            e.preventDefault();
        }
    });

    // Session Verification
    let sessionTimer;
    function checkSession() {
        fetch("{{ url_for('doc.verify_session') }}", { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                const display = document.getElementById('risk-display');
                if (display) display.textContent = data.risk_score + "%";

                if (data.action === 'terminate') {
                    window.location = '/auth/logout';
                } else if (data.action === 'restrict') {
                    document.querySelector('.content-layer').style.filter = 'blur(5px)';
                } else {
                    document.querySelector('.content-layer').style.filter = 'none';
                }
            })
            .catch(err => console.error("Session check failed"));
    }

    sessionTimer = setInterval(checkSession, 30000); // 30s check
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') checkSession();
    });
</script>
{% endblock %}
