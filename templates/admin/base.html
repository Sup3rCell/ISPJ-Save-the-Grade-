{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='admin_dashboard.css') }}">

<div class="admin-container">
    <!-- Sidebar Navigation -->
    <div class="admin-sidebar">
        <div class="sidebar-header">
            <i class="fas fa-shield-alt"></i> Admin Panel
        </div>
        
        <nav class="sidebar-nav">
            <a href="{{ url_for('admin.dashboard') }}" class="nav-link {% if request.endpoint == 'admin.dashboard' %}active{% endif %}">
                <i class="fas fa-chart-line"></i> Dashboard
            </a>
            <a href="{{ url_for('admin.logs') }}" class="nav-link {% if request.endpoint == 'admin.logs' %}active{% endif %}">
                <i class="fas fa-file-alt"></i> Access Logs
            </a>
            <a href="{{ url_for('admin.versions') }}" class="nav-link {% if request.endpoint == 'admin.versions' %}active{% endif %}">
                <i class="fas fa-history"></i> Versions
            </a>
            <a href="{{ url_for('admin.risk_history') }}" class="nav-link {% if request.endpoint == 'admin.risk_history' %}active{% endif %}">
                <i class="fas fa-exclamation-triangle"></i> Risk History
            </a>
            <a href="{{ url_for('admin.honeytoken_alerts') }}" class="nav-link {% if request.endpoint == 'admin.honeytoken_alerts' %}active{% endif %}">
                <i class="fas fa-bell"></i> Honeytoken Alerts
            </a>
            <a href="{{ url_for('admin.test_risk') }}" class="nav-link {% if request.endpoint == 'admin.test_risk' %}active{% endif %}">
                <i class="fas fa-vial"></i> Risk Tests
            </a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="admin-main">
        {% block admin_content %}{% endblock %}
    </div>
</div>

{% endblock %}
