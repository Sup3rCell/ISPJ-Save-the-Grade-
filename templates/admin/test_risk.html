{% extends "admin/base.html" %}

{% block admin_content %}
<div class="admin-header">
    <h1><i class="fas fa-vial me-2"></i>Risk Engine Tests</h1>
    <div class="header-info">
        <span class="text-muted">Generate synthetic events to validate logging and alerts</span>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h5 class="card-title">Test Scenarios</h5>
    </div>
    <div class="card-body">
        <div class="d-flex flex-wrap gap-2">
            <button class="btn btn-outline-warning" data-scenario="failed_logins">
                Failed Logins x5
            </button>
            <button class="btn btn-outline-info" data-scenario="rapid_downloads">
                Rapid Downloads x8
            </button>
            <button class="btn btn-outline-danger" data-scenario="impossible_travel">
                Impossible Travel
            </button>
            <button class="btn btn-outline-danger" data-scenario="high_risk_alert">
                High Risk Alert
            </button>
            <button class="btn btn-outline-primary" data-scenario="bulk_export">
                Bulk Export
            </button>
        </div>

        <div class="mt-3">
            <div id="testStatus" class="text-muted">Select a scenario to generate logs.</div>
        </div>
    </div>
</div>

<script>
const buttons = document.querySelectorAll('[data-scenario]');
const statusEl = document.getElementById('testStatus');

async function runScenario(scenario) {
    statusEl.textContent = `Running ${scenario}...`;
    try {
        const res = await fetch("{{ url_for('admin.run_test_risk') }}", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ scenario })
        });
        const data = await res.json();
        if (data.status === 'success') {
            statusEl.textContent = `Created ${data.created} test log(s). Check Access Logs and Honeytoken Alerts.`;
        } else {
            statusEl.textContent = data.error || 'Failed to create test logs.';
        }
    } catch (err) {
        statusEl.textContent = 'Request failed. Check server logs.';
    }
}

buttons.forEach(btn => {
    btn.addEventListener('click', () => runScenario(btn.dataset.scenario));
});
</script>
{% endblock %}
