{% extends "admin/base.html" %}

{% block admin_content %}
<div class="admin-header">
    <h1><i class="fas fa-vial me-2"></i>Risk Engine Tests</h1>
    <div class="header-info">
        <span class="text-muted">Generate synthetic events to validate logging and alerts</span>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h5 class="card-title">Test Scenarios</h5>
    </div>
    <div class="card-body">
        <div class="d-flex flex-wrap gap-2">
            <button class="btn btn-outline-warning" data-scenario="failed_logins">
                Failed Logins x5
            </button>
            <button class="btn btn-outline-info" data-scenario="rapid_downloads">
                Rapid Downloads x8
            </button>
            <button class="btn btn-outline-danger" data-scenario="impossible_travel">
                Impossible Travel
            </button>
            <button class="btn btn-outline-danger" data-scenario="high_risk_alert">
                High Risk Alert
            </button>
            <button class="btn btn-outline-primary" data-scenario="bulk_export">
                Bulk Export
            </button>
        </div>

        <hr class="my-4">

        <div class="row g-3 align-items-end">
            <div class="col-md-4">
                <label class="form-label">Target User (for Manual Tests)</label>
                <select id="targetUser" class="form-select">
                    <option value="">-- Select User --</option>
                    {% for user in users %}
                    <option value="{{ user.id }}">{{ user.username }} (Risk: {{ user.risk_state.current_score if
                        user.risk_state else 0 }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-8">
                <button class="btn btn-warning" data-scenario="manual_increase">
                    <i class="fas fa-arrow-up me-1"></i> Increase Risk (+10)
                </button>
                <button class="btn btn-secondary" data-scenario="manual_reset">
                    <i class="fas fa-undo me-1"></i> Reset Risk
                </button>
            </div>
        </div>

        <div class="mt-3">
            <div id="testStatus" class="text-muted">Select a scenario to generate logs.</div>
        </div>
    </div>
</div>

<script>
    const buttons = document.querySelectorAll('[data-scenario]');
    const statusEl = document.getElementById('testStatus');

    async function runScenario(scenario) {
        const targetUserId = document.getElementById('targetUser').value;

        // Require user selection only for manual scenarios
        if ((scenario === 'manual_increase' || scenario === 'manual_reset') && !targetUserId) {
            statusEl.textContent = 'Please select a target user first.';
            statusEl.className = 'text-danger fw-bold';
            return;
        }

        statusEl.textContent = `Running ${scenario}...`;
        statusEl.className = 'text-muted';

        try {
            const res = await fetch("{{ url_for('admin.run_test_risk') }}", {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    scenario: scenario,
                    user_id: targetUserId
                })
            });
            const data = await res.json();

            if (data.status === 'success') {
                if (data.message) {
                    statusEl.textContent = data.message;
                    statusEl.className = 'text-success fw-bold';
                } else {
                    statusEl.textContent = `Created ${data.created} test log(s). Check Access Logs.`;
                    statusEl.className = 'text-success';
                }
            } else {
                statusEl.textContent = data.error || 'Failed to create test logs.';
                statusEl.className = 'text-danger';
            }
        } catch (err) {
            console.error(err);
            statusEl.textContent = 'Request failed. Check server logs.';
            statusEl.className = 'text-danger';
        }
    }

    buttons.forEach(btn => {
        btn.addEventListener('click', () => runScenario(btn.dataset.scenario));
    });
</script>
{% endblock %}
